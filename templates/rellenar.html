<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rellenar Datos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 800px;">
        <div id="status" class="alert alert-secondary text-center">Registros listos para generar: <b id="cuenta">0</b></div>
        
        <h3>Datos para: {{ nombre_archivo }}</h3>
        <form id="form_inputs" class="row">
            {% for campo in campos %}
            <div class="col-md-6 mb-3">
                <label class="text-capitalize">{{ campo | replace('_', ' ') }}</label>
                <input type="text" id="val_{{ campo }}" class="form-control" required>
            </div>
            {% endfor %}
        </form>

        <div class="d-flex gap-2 mt-4">
            <button type="button" onclick="add()" class="btn btn-outline-primary w-50">➕ Guardar y añadir otro</button>
            <button type="button" onclick="finish()" class="btn btn-success w-50">🚀 Generar Documento(s)</button>
        </div>

        <form action="/generar_final" method="post" id="form_hidden">
            <input type="hidden" name="nombre_archivo" value="{{ nombre_archivo }}">
            <input type="hidden" name="datos_totales" id="payload">
        </form>
    </div>

    <script>
        let dataStore = [];
        const fields = [{% for c in campos %}"{{ c }}",{% endfor %}];

        function add() {
            let entry = {};
            fields.forEach(f => {
                entry[f] = document.getElementById('val_' + f).value;
                document.getElementById('val_' + f).value = ''; // Limpiar
            });
            dataStore.push(entry);
            document.getElementById('cuenta').innerText = dataStore.length;
        }

        function finish() {
            // Si el usuario no pulsó "Añadir otro" pero llenó el formulario, lo tomamos automáticamente
            let hasData = fields.some(f => document.getElementById('val_' + f).value !== '');
            if (hasData) {
                let entry = {};
                fields.forEach(f => entry[f] = document.getElementById('val_' + f).value);
                dataStore.push(entry);
            }

            if (dataStore.length === 0) return alert("Ingresa al menos un dato");
            
            document.getElementById('payload').value = JSON.stringify(dataStore);
            document.getElementById('form_hidden').submit();
        }
    </script>
</body>
</html>
