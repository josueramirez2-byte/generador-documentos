<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Word - Rellenar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 card shadow p-4">
                <h2 class="text-center mb-4">✍️ Rellenar Datos</h2>
                <form action="/generar_documento" method="post">
                    <input type="hidden" name="nombre_archivo" value="{{ nombre_archivo }}">
                    
                    <div class="row">
                    {% for campo in campos %}
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-capitalize">{{ campo | replace('_', ' ') }}</label>
                            <input type="text" name="{{ campo }}" class="form-control" required>
                        </div>
                    {% endfor %}
                    </div>
                    
                    <hr>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">Generar y Descargar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
