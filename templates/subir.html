<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container card shadow p-4" style="max-width: 600px;">
        <h2 class="mb-4">1. Elige tu Plantilla</h2>
        <form action="/analizar_plantilla" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Plantillas en el servidor:</label>
                <select name="plantilla_existente" class="form-select">
                    <option value="">-- Usar una nueva --</option>
                    {% for p in plantillas %}
                    <option value="{{ p }}">{{ p }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">O sube una nueva (.docx):</label>
                <input type="file" name="archivo" class="form-control" accept=".docx">
            </div>
            <button type="submit" class="btn btn-primary w-100">Cargar Campos</button>
        </form>
    </div>
</body>
</html>
