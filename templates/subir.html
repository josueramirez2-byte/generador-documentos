<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Word - Subir</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 card shadow p-4">
                <h2 class="text-center mb-4">📄 Subir Plantilla</h2>
                <p class="text-muted small">Sube un archivo .docx que contenga etiquetas tipo <code>{{ campo }}</code></p>
                <form action="/analizar_plantilla" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="file" name="archivo" class="form-control" accept=".docx" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Analizar Documento</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
